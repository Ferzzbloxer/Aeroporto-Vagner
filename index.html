<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeroporto Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel-aeroporto">
        <h1>✈️ Painel de Controle</h1>

        <div style="margin-bottom: 20px;">
            <label for="seletor-voos"><strong>Selecionar Voo no Radar:</strong></label>
            <select id="seletor-voos" onchange="mudarVooSelecionado(this.value)">
                </select>
        </div>
        
        <div id="display-voo" class="cartao-voo">
            <p><strong>Código:</strong> <span id="txt-codigo">---</span></p>
            <p><strong>Rota:</strong> <span id="txt-rota">---</span></p>
            <p><strong>Horário:</strong> <span id="txt-horario">---</span></p>
            <p><strong>Altitude:</strong> <span id="txt-altitude">0</span> metros</p>
            <p><strong>Status:</strong> <span id="txt-status" class="status-box">Aguardando...</span></p>
        </div>

        <div class="area-aviao">
            <img id="img-aviao" src="https://cdn-icons-png.flaticon.com/512/723/723979.png" alt="Avião" width="100">
        </div>

        <div class="controles">
            <button class="btn-decolar" onclick="chamarMetodoVoo('decolar')">Decolar</button>
            <button class="btn-pousar" onclick="chamarMetodoVoo('pousar')">Pousar</button>
            <button class="btn-altitude" onclick="chamarMetodoVoo('verAltitude')">Ganhar Altitude</button>
            <button class="btn-horario" onclick="alterarHorario()">Mudar Horário</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
